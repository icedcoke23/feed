name: CI

on:
  push:
    branches:
      - main
      - 'trae/**'
  pull_request:
    branches:
      - main

jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --prefer-frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Type check
        run: pnpm ts-check
